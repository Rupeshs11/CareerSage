# ============================================
# CareerSage - Unified CI/CD Pipeline
# Single workflow for Infrastructure + Build + Deploy
# ============================================
#
# Actions (via workflow_dispatch dropdown):
#   terraform-plan    → Preview infrastructure changes
#   terraform-apply   → Create/update EC2 instance
#   terraform-destroy → Destroy EC2 instance
#   build-deploy      → Build Docker image + deploy to EC2
#   full              → Apply infra + build + deploy (complete pipeline)
#
# Auto-trigger: push to main → build-deploy
#
# Required Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (Terraform)
#   TF_VAR_KEY_NAME                           (AWS key pair name)
#   EC2_SSH_KEY, EC2_HOST, EC2_USER           (SSH deploy)
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN       (Docker Hub)
# ============================================

name: "CareerSage Pipeline"

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      action:
        description: "Select action to run"
        required: true
        type: choice
        options:
          - terraform-plan
          - terraform-apply
          - terraform-destroy
          - build-deploy
          - full

jobs:
  # ==========================================
  # Job 1: Terraform (Infrastructure)
  # Runs on: terraform-plan, terraform-apply,
  #          terraform-destroy, full
  # ==========================================
  terraform:
    name: "🏗️ Terraform"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      contains(fromJSON('["terraform-plan","terraform-apply","terraform-destroy","full"]'), github.event.inputs.action)

    outputs:
      ec2_public_ip: ${{ steps.apply.outputs.ec2_ip }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Restore state from previous run (critical for knowing what already exists)
      - name: Download Terraform State
        uses: dawidd6/action-download-artifact@v6
        with:
          name: terraform-state
          path: terraform/
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      # ---------- Plan ----------
      - name: Terraform Plan
        id: plan
        run: terraform plan -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}" -out=tfplan -no-color
        if: github.event.inputs.action != 'terraform-destroy'

      - name: Terraform Plan (Destroy)
        run: terraform plan -destroy -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}" -no-color
        if: github.event.inputs.action == 'terraform-destroy'

      # ---------- Apply ----------
      - name: Terraform Apply
        id: apply
        if: github.event.inputs.action == 'terraform-apply' || github.event.inputs.action == 'full'
        run: |
          terraform apply -auto-approve -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}"
          echo "ec2_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      # ---------- Destroy ----------
      - name: Terraform Destroy
        if: github.event.inputs.action == 'terraform-destroy'
        run: terraform apply -destroy -auto-approve -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}"

      # Save state so next run knows what resources exist
      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: |
            terraform/terraform.tfstate
            terraform/terraform.tfstate.backup
          overwrite: true
          retention-days: 90

  # ==========================================
  # Job 2: Build & Push Docker Image
  # Runs on: build-deploy, full, push to main
  # ==========================================
  build:
    name: "🐳 Build & Push Image"
    runs-on: ubuntu-latest
    needs: [terraform]
    if: >-
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' &&
         contains(fromJSON('["build-deploy","full"]'), github.event.inputs.action))
      )

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careersage:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/careersage:${{ github.sha }}

  # ==========================================
  # Job 3: Deploy to EC2
  # Runs on: build-deploy, full, push to main
  # ==========================================
  deploy:
    name: "🚀 Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [terraform, build]
    if: >-
      always() &&
      (needs.build.result == 'success') &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' &&
         contains(fromJSON('["build-deploy","full"]'), github.event.inputs.action))
      )

    steps:
      - name: Determine EC2 Host
        id: host
        run: |
          if [ -n "${{ needs.terraform.outputs.ec2_public_ip }}" ]; then
            echo "ec2_host=${{ needs.terraform.outputs.ec2_public_ip }}" >> $GITHUB_OUTPUT
          else
            echo "ec2_host=${{ secrets.EC2_HOST }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate EC2 Host
        run: |
          HOST="${{ steps.host.outputs.ec2_host }}"
          if [ -z "$HOST" ]; then
            echo "❌ EC2_HOST is empty. Set the EC2_HOST secret or run terraform-apply first."
            exit 1
          fi
          echo "✅ Target host: $HOST"

      - name: Wait for EC2 to be reachable
        run: |
          HOST="${{ steps.host.outputs.ec2_host }}"
          echo "Waiting for $HOST to accept SSH connections..."
          for i in $(seq 1 12); do
            if ssh-keyscan -H "$HOST" 2>/dev/null | grep -q .; then
              echo "✅ Host is reachable!"
              exit 0
            fi
            echo "Attempt $i/12 - not ready, waiting 10s..."
            sleep 10
          done
          echo "❌ Host not reachable after 2 minutes"
          exit 1

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.host.outputs.ec2_host }} >> ~/.ssh/known_hosts

      - name: Setup EC2 (first-time + updates)
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ steps.host.outputs.ec2_host }} << 'EOF'
            set -e

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg --yes
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
              echo "✅ Docker installed"
            fi

            # Install Nginx if not present
            if ! command -v nginx &> /dev/null; then
              echo "📦 Installing Nginx..."
              sudo apt-get install -y nginx
              sudo systemctl enable nginx
              sudo systemctl start nginx
              echo "✅ Nginx installed"
            fi

            # Create project directory
            mkdir -p ~/careersage
          EOF

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy project files to EC2
        run: |
          HOST="${{ secrets.EC2_USER }}@${{ steps.host.outputs.ec2_host }}"
          ssh $HOST "mkdir -p ~/careersage/nginx"
          scp docker-compose.yml $HOST:~/careersage/docker-compose.yml
          scp nginx/default.conf $HOST:~/careersage/nginx/default.conf

      - name: Deploy Latest Image
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ steps.host.outputs.ec2_host }} << 'EOF'
          set -e
          cd ~/careersage
          sudo docker compose pull
          sudo docker compose up -d
          sudo docker image prune -f
          echo "========================================="
          echo " ✅ Deployment complete!"
          echo "========================================="
          sudo docker ps
          EOF
