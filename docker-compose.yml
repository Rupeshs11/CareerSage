# ============================================
# CareerSage - Docker Compose (Production)
# Flask Backend + MongoDB + Nginx Reverse Proxy
# ============================================

services:
  # ---------- MongoDB Database ----------
  mongodb:
    image: mongo:latest
    container_name: careersage-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=careersage
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - careersage-net

  # ---------- Flask Backend + Frontend ----------
  app:
    image: rupeshs11/careersage:latest
    container_name: careersage-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/careersage
      - TZ=Asia/Kolkata
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-jwt-key-change-me}
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_API_KEY_2=${NVIDIA_API_KEY_2:-}
      - NVIDIA_API_KEY_3=${NVIDIA_API_KEY_3:-}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-meta/llama-3.1-8b-instruct}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - careersage-net

volumes:
  mongo_data:
    driver: local

networks:
  careersage-net:
    driver: bridge
