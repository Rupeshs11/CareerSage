<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareerSage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-glow {
            background: radial-gradient(ellipse at 50% 0%, rgba(5, 150, 105, 0.08) 0%, transparent 60%);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: rgba(5, 150, 105, 0.5);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #059669 0%, #10B981 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(5, 150, 105, 0.3);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.06;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
    </style>
</head>

<body class="bg-[#FFF8F0] text-slate-700 min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background effects -->
    <div class="auth-glow absolute inset-0 pointer-events-none"></div>
    <div class="floating-shape w-96 h-96 bg-emerald-300 -top-20 -right-20" style="position:absolute"></div>
    <div class="floating-shape w-72 h-72 bg-teal-300 -bottom-16 -left-16"
        style="position:absolute; animation-delay: -10s"></div>

    <div class="w-full max-w-md px-5 relative z-10">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="./index.html" class="inline-flex items-center gap-1 group">
                <span class="text-slate-800 font-extrabold text-3xl tracking-tight">Career<span
                        style="background:linear-gradient(135deg,#059669,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Sage</span></span>
            </a>
            <p class="text-slate-500 mt-3 text-sm">Welcome back! Sign in to continue your journey.</p>
        </div>

        <!-- Login Form Card -->
        <div class="auth-card rounded-2xl p-6 md:p-8 shadow-2xl shadow-black/20">
            <h2 class="text-xl font-bold text-slate-800 mb-1">Sign In</h2>
            <p class="text-slate-500 text-sm mb-6">Enter your credentials to access your account</p>

            <form id="login-form" class="space-y-5">
                <!-- Email -->
                <div>
                    <label for="email"
                        class="block text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                </path>
                            </svg>
                        </div>
                        <input type="email" id="email" name="email" required
                            class="input-field w-full rounded-xl pl-10 pr-4 py-3 text-slate-800 text-sm placeholder-slate-400 focus:outline-none"
                            placeholder="you@example.com">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password"
                        class="block text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                </path>
                            </svg>
                        </div>
                        <input type="password" id="password" name="password" required
                            class="input-field w-full rounded-xl pl-10 pr-4 py-3 text-slate-800 text-sm placeholder-slate-400 focus:outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="login-btn"
                    class="btn-primary w-full text-white font-semibold py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-[#0a0f1e]">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-black/[0.06]"></div>
                <span class="text-xs text-slate-400 uppercase tracking-wider">New here?</span>
                <div class="flex-1 h-px bg-black/[0.06]"></div>
            </div>

            <!-- Register Link -->
            <a href="./register.html"
                class="block w-full text-center py-3 rounded-xl border border-black/[0.08] text-slate-500 hover:text-slate-700 hover:border-black/[0.15] hover:bg-black/50 transition-all text-sm font-medium">
                Create an account
            </a>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-600 text-xs mt-6">
            &copy; 2025 CareerSage. All rights reserved.
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Show session expired message if redirected from 401
        if (window.location.search.includes('expired=1')) {
            var notice = document.createElement('div');
            notice.className = 'bg-yellow-500/10 border border-yellow-500/20 text-yellow-400 text-xs p-3 rounded-xl mb-4 text-center flex items-center justify-center gap-2';
            notice.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path></svg> Your session has expired. Please log in again.';
            document.getElementById('login-form').parentNode.insertBefore(notice, document.getElementById('login-form'));
        }

        // Show success message if redirected from register
        if (window.location.search.includes('registered=1')) {
            var success = document.createElement('div');
            success.className = 'bg-green-500/10 border border-green-500/20 text-green-400 text-xs p-3 rounded-xl mb-4 text-center flex items-center justify-center gap-2';
            success.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Account created successfully! Please log in.';
            document.getElementById('login-form').parentNode.insertBefore(success, document.getElementById('login-form'));
        }

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('login-btn');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin w-5 h-5 mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>';

            try {
                const response = await API.Auth.login(email, password);
                if (response.user) {
                    localStorage.setItem('careersage_user', JSON.stringify(response.user));
                    window.location.href = './dashboard.html';
                }
            } catch (error) {
                alert(error.message || 'Login failed. Please check your credentials.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
