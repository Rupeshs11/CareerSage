<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Roadmaps - CareerSage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-[#FFF8F0] text-slate-700">

    <div class="flex flex-col h-screen">
        <!-- Header -->
        <div id="header-placeholder"></div>

        <!-- Main Content (scrollable)-->
        <div class="flex-1 overflow-y-auto">
            <div class="container mx-auto px-4 flex flex-col md:flex-row">
                <!-- Left Sidebar (hidden on mobile) -->
                <aside class="hidden md:block md:w-1/4 py-8 pr-6">
                    <div class="sticky top-20 bg-white/70 backdrop-blur-xl border border-black/[0.06] rounded-2xl p-5 shadow-sm">
                        <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Categories</h2>
                        <nav id="roadmap-nav" class="flex flex-col gap-1.5">
                        </nav>
                    </div>
                </aside>

                <!-- Right Content Area -->
                <main id="roadmap-content" class="w-full md:w-3/4 py-8 md:border-l border-black/[0.06] md:pl-8">
                    <!-- JS Content-->
                </main>
            </div>
        </div>

        <!-- Footer-->
        <div id="footer-placeholder"></div>
    </div>

    <script src="js/load-header-footer.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js?v=2" type="module"></script>
</body>

</html>
